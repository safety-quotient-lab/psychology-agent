name: ShellCheck

on:
  push:
    paths:
      - '**/*.sh'
  pull_request:
    paths:
      - '**/*.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./.claude/worktrees/*" \
            -not -path "./node_modules/*" \
            -not -path "./reconstruction/*" \
            -not -path "./safety-quotient/*" \
            -not -path "./pje-framework/*" \
            -not -type l \
            -print0 | xargs -0 shellcheck -S warning -x
