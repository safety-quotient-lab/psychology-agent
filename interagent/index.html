<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interagent Mesh — Safety Quotient Lab</title>
    <script type="application/ld+json">
    {
        "@context": [
            "https://schema.org",
            {"sqm": "https://interagent.safety-quotient.dev/vocab#"}
        ],
        "@type": "SoftwareApplication",
        "@id": "https://interagent.safety-quotient.dev",
        "name": "safety-quotient-mesh",
        "url": "https://interagent.safety-quotient.dev",
        "description": "Federated inter-agent mesh for psychoemotional safety research. BFT consensus among autonomous peers. No backend — client-side composition.",
        "applicationCategory": "Research Infrastructure",
        "provider": {
            "@type": "Organization",
            "name": "Safety Quotient Lab",
            "url": "https://github.com/safety-quotient-lab"
        },
        "hasPart": [
            {
                "@type": ["SoftwareApplication", "sqm:Agent"],
                "name": "psychology-agent",
                "url": "https://psychology-agent.safety-quotient.dev"
            },
            {
                "@type": ["SoftwareApplication", "sqm:Agent"],
                "name": "psq-agent",
                "url": "https://psq-agent.safety-quotient.dev"
            }
        ],
        "additionalProperty": [
            {
                "@type": "PropertyValue",
                "name": "sqm:ConsensusTier",
                "value": "C1/C2/C3"
            },
            {
                "@type": "PropertyValue",
                "name": "vocabularyUrl",
                "value": "https://interagent.safety-quotient.dev/vocab"
            }
        ]
    }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: #0d1117; color: #c9d1d9;
            padding: 24px; line-height: 1.5;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 1px solid #21262d;
        }
        header h1 {
            color: #58a6ff; font-size: 1.5em; font-weight: bold;
            margin-bottom: 4px;
        }
        header p { color: #8b949e; font-size: 0.85em; }

        .mesh-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .agent-card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
        }
        .agent-card.loading { opacity: 0.5; }
        .agent-card.error { border-color: #f85149; }
        .agent-card.online { border-color: #3fb950; }

        .agent-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .agent-name {
            color: #58a6ff; font-size: 1.1em; font-weight: bold;
        }
        .agent-status {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.8em;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            display: inline-block;
        }
        .dot-green { background: #3fb950; }
        .dot-yellow { background: #d29922; }
        .dot-red { background: #f85149; }
        .dot-gray { background: #484f58; }

        .agent-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .metric {
            background: #0d1117;
            border: 1px solid #21262d;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
        }
        .metric-value {
            font-size: 1.3em; font-weight: bold;
            color: #e6edf3;
        }
        .metric-label {
            font-size: 0.7em; color: #8b949e;
            text-transform: uppercase;
        }

        .agent-details { font-size: 0.8em; color: #8b949e; }
        .agent-details table { width: 100%; border-collapse: collapse; }
        .agent-details td {
            padding: 3px 8px;
            border-bottom: 1px solid #21262d;
        }
        .agent-details td:first-child { color: #c9d1d9; }

        .agent-links {
            margin-top: 12px;
            display: flex; gap: 12px;
        }
        .agent-links a {
            color: #58a6ff; text-decoration: none; font-size: 0.8em;
        }
        .agent-links a:hover { text-decoration: underline; }

        .mesh-topology {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 32px;
        }
        .mesh-topology h2 {
            color: #58a6ff; font-size: 1em; margin-bottom: 12px;
        }
        .topology-visual {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85em;
            white-space: pre;
            color: #8b949e;
            text-align: center;
            padding: 16px;
        }
        .topology-visual .active { color: #3fb950; }
        .topology-visual .label { color: #58a6ff; }

        .peers-table {
            width: 100%; border-collapse: collapse;
            font-size: 0.8em;
        }
        .peers-table th {
            text-align: left; padding: 6px 8px;
            border-bottom: 2px solid #30363d;
            color: #8b949e; text-transform: uppercase; font-size: 0.85em;
        }
        .peers-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #21262d;
        }

        footer {
            text-align: center;
            color: #484f58; font-size: 0.75em;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #21262d;
        }

        .refresh-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; font-size: 0.8em; color: #8b949e;
        }
        .refresh-bar button {
            background: #21262d; border: 1px solid #30363d;
            color: #c9d1d9; padding: 4px 12px; border-radius: 4px;
            cursor: pointer; font-family: inherit; font-size: 0.9em;
        }
        .refresh-bar button:hover { background: #30363d; }

        .error-msg { color: #f85149; font-size: 0.8em; margin-top: 8px; }
    </style>
</head>
<body>

<header>
    <h1>Interagent Mesh</h1>
    <p>Safety Quotient Lab — Federated Agent Status</p>
</header>

<div class="refresh-bar">
    <span id="last-update">Loading...</span>
    <button onclick="refreshAll()">Refresh</button>
</div>

<div class="mesh-grid" id="agent-grid">
    <!-- Agent cards injected by JavaScript -->
</div>

<div class="mesh-topology" id="topology-section" style="display:none">
    <h2>Mesh Topology</h2>
    <div id="topology-content"></div>
</div>

<footer>
    <p>Client-side composition — no backend. Data fetched from agent /api/status endpoints.</p>
    <p>
        <a href="https://github.com/safety-quotient-lab" style="color:#58a6ff;text-decoration:none">
            Safety Quotient Lab
        </a>
    </p>
</footer>

<script>
const AGENTS = [
    {
        id: "psychology-agent",
        url: "https://psychology-agent.safety-quotient.dev",
        apiUrl: "https://psychology-agent.safety-quotient.dev/api/status",
    },
    {
        id: "psq-agent",
        url: "https://psq-agent.safety-quotient.dev",
        apiUrl: "https://psq-agent.safety-quotient.dev/api/status",
    },
];

const REFRESH_INTERVAL_MS = 30000;
let agentData = {};

function renderAgentCard(agent, data, error) {
    const card = document.createElement("div");
    card.className = "agent-card";

    if (error) {
        card.classList.add("error");
        card.innerHTML = `
            <div class="agent-header">
                <span class="agent-name">${agent.id}</span>
                <span class="agent-status"><span class="dot dot-red"></span> offline</span>
            </div>
            <div class="error-msg">${error}</div>
            <div class="agent-links">
                <a href="${agent.url}" target="_blank">dashboard</a>
                <a href="${agent.url}/.well-known/agent-card.json" target="_blank">agent-card</a>
            </div>`;
        return card;
    }

    if (!data) {
        card.classList.add("loading");
        card.innerHTML = `
            <div class="agent-header">
                <span class="agent-name">${agent.id}</span>
                <span class="agent-status"><span class="dot dot-gray"></span> loading</span>
            </div>`;
        return card;
    }

    card.classList.add("online");
    const totals = data.totals || {};
    const budget = data.trust_budget || {};
    const heartbeat = data.heartbeat || {};
    const schedule = data.schedule || {};
    const peers = data.peers || [];
    const gates = data.active_gates || [];

    const budgetCurrent = budget.budget_current != null ? budget.budget_current : "?";
    const budgetMax = budget.budget_max != null ? budget.budget_max : "?";
    const schemaVer = data.schema_version || "?";

    card.innerHTML = `
        <div class="agent-header">
            <span class="agent-name">${data.agent_id || agent.id}</span>
            <span class="agent-status"><span class="dot dot-green"></span> online</span>
        </div>
        <div class="agent-metrics">
            <div class="metric">
                <div class="metric-value">${totals.messages || 0}</div>
                <div class="metric-label">Messages</div>
            </div>
            <div class="metric">
                <div class="metric-value">${totals.sessions || 0}</div>
                <div class="metric-label">Sessions</div>
            </div>
            <div class="metric">
                <div class="metric-value">${budgetCurrent}/${budgetMax}</div>
                <div class="metric-label">Trust Budget</div>
            </div>
            <div class="metric">
                <div class="metric-value">${totals.unprocessed || 0}</div>
                <div class="metric-label">Pending</div>
            </div>
            <div class="metric">
                <div class="metric-value">${gates.length}</div>
                <div class="metric-label">Active Gates</div>
            </div>
            <div class="metric">
                <div class="metric-value">${totals.epistemic_flags_unresolved || 0}</div>
                <div class="metric-label">Epistemic Debt</div>
            </div>
        </div>
        <div class="agent-details">
            <table>
                <tr><td>Schema</td><td>v${schemaVer}</td></tr>
                <tr><td>Peers</td><td>${peers.map(p => p.from_agent || "?").join(", ") || "none"}</td></tr>
                <tr><td>Collected</td><td>${data.collected_at || "?"}</td></tr>
                ${schedule.cron_entry ? `<tr><td>Sync schedule</td><td>${schedule.cron_entry}</td></tr>` : ""}
                ${heartbeat.timestamp ? `<tr><td>Last heartbeat</td><td>${heartbeat.timestamp}</td></tr>` : ""}
            </table>
        </div>
        <div class="agent-links">
            <a href="${agent.url}" target="_blank">dashboard</a>
            <a href="${agent.apiUrl}" target="_blank">api/status</a>
            <a href="${agent.url}/.well-known/agent-card.json" target="_blank">agent-card</a>
        </div>`;
    return card;
}

function renderTopology() {
    const section = document.getElementById("topology-section");
    const content = document.getElementById("topology-content");
    const onlineAgents = Object.keys(agentData).filter(id => agentData[id].data);

    if (onlineAgents.length < 1) {
        section.style.display = "none";
        return;
    }

    section.style.display = "block";

    // Build peer connection table from registry data
    let rows = "";
    for (const agentId of onlineAgents) {
        const data = agentData[agentId].data;
        const registry = data.registry_agents || {};
        for (const [peerId, peerCfg] of Object.entries(registry)) {
            if (peerId === agentId) continue;
            const peerOnline = onlineAgents.includes(peerId);
            rows += `<tr>
                <td>${agentId}</td>
                <td style="color:${peerOnline ? "#3fb950" : "#484f58"}">${peerOnline ? "connected" : "unknown"}</td>
                <td>${peerId}</td>
                <td>${peerCfg.transport || "?"}</td>
                <td>${peerCfg.role || "?"}</td>
            </tr>`;
        }
    }

    content.innerHTML = `
        <table class="peers-table">
            <tr><th>From</th><th>Status</th><th>To</th><th>Transport</th><th>Role</th></tr>
            ${rows || "<tr><td colspan='5' style='color:#484f58'>No peer connections found</td></tr>"}
        </table>`;
}

async function fetchAgent(agent) {
    try {
        const response = await fetch(agent.apiUrl, { mode: "cors" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        agentData[agent.id] = { data, error: null };
    } catch (err) {
        agentData[agent.id] = { data: null, error: err.message };
    }
}

async function refreshAll() {
    await Promise.all(AGENTS.map(fetchAgent));

    const grid = document.getElementById("agent-grid");
    grid.innerHTML = "";
    for (const agent of AGENTS) {
        const state = agentData[agent.id] || {};
        grid.appendChild(renderAgentCard(agent, state.data, state.error));
    }

    renderTopology();

    const now = new Date().toLocaleTimeString();
    document.getElementById("last-update").textContent = `Last update: ${now} (auto-refresh 30s)`;
}

// Initial load
refreshAll();
setInterval(refreshAll, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
