name = "psychology-interface"
main = "src/worker.js"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "psychology-interface"
database_id = "TBD"   # set after: wrangler d1 create psychology-interface

[[kv_namespaces]]
binding = "SESSION_KV"
id = "TBD"             # set after: wrangler kv:namespace create SESSION_KV

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "psychology-interface-artifacts"

[vars]
PSYCHOLOGY_AGENT_MODEL = "claude-opus-4-6"
PSQ_CONFIDENCE_THRESHOLD = "0.6"
# PSQ scoring endpoint — set to deployed PSQ server URL for production,
# or http://localhost:<port> for local dev alongside `npm run serve` in safety-quotient/
# PSQ_ENDPOINT_URL = ""

# Secrets (set via: wrangler secret put ANTHROPIC_API_KEY)
# ANTHROPIC_API_KEY
# wrangler secret put PSQ_ENDPOINT_URL  (if URL contains auth token)

[dev]
port = 8787

# Local dev default: PSQ server on same machine (npm run serve in safety-quotient/).
# For CF Tunnel or remote PSQ endpoint: override in .dev.vars (gitignored).
# See .dev.vars.example for the pattern.
# Transport decision: Option C (CF Tunnel) for smoke test, Option B (VPS) for production.
[dev.vars]
PSQ_ENDPOINT_URL = "http://127.0.0.1:3000"
