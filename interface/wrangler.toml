name = "psychology-interface"
main = "src/worker.js"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

# Create these resources via wrangler CLI, then paste the IDs here:
#   wrangler d1 create psychology-interface
#   wrangler kv namespace create SESSION_KV
#   wrangler r2 bucket create psychology-interface-artifacts
[[d1_databases]]
binding = "DB"
database_name = "psychology-interface"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "YOUR_KV_NAMESPACE_ID"

[[r2_buckets]]
binding = "ARTIFACTS"
bucket_name = "psychology-interface-artifacts"

[vars]
PSYCHOLOGY_AGENT_MODEL = "claude-opus-4-6"
PSQ_CONFIDENCE_THRESHOLD = "0.6"
# PSQ scoring endpoint — set to deployed PSQ server URL for production,
# or http://localhost:<port> for local dev alongside `npm run serve` in safety-quotient/
# PSQ_ENDPOINT_URL = ""

# Secrets (set via: wrangler secret put ANTHROPIC_API_KEY)
# ANTHROPIC_API_KEY
# wrangler secret put PSQ_ENDPOINT_URL  (if URL contains auth token)

[dev]
port = 8787
# PSQ_ENDPOINT_URL for local dev: set in .dev.vars (gitignored, see .dev.vars.example).
# Default for same-machine dev: PSQ_ENDPOINT_URL=http://127.0.0.1:3000
# CF Tunnel or VPS: override with the remote URL in .dev.vars.
