decision_framework:
  method: knock-on analysis
  orders: 10
  confidence_bands:
    - orders: [1, 2]
      label: certain
    - orders: [3]
      label: likely
    - orders: [4, 5]
      label: possible
    - orders: [6]
      label: speculative
    - orders: [7]
      label: structural
    - orders: [8]
      label: horizon
    - orders: [9]
      label: emergent (INCOSE)
    - orders: [10]
      label: theory-revising (Popper)
  structural_checkpoint: mandatory at all scales (orders 7-10 scan)
  severity_tiers:
    XS: 3-order + scan
    S: 4-order + scan
    M: 8-order + 2-pass
    L: 10-order + 2-pass

lesson_lifecycle:
  stages:
    - observation (in-session)
    - capture (lessons.md, gitignored)
    - classification (YAML frontmatter)
    - promotion_candidate (3+ same pattern_type or domain)
    - promotion (user approves to CLAUDE.md or trigger)
    - graduation (ceremony via /cycle Step 8b)
  schema_fields:
    - pattern_type
    - domain
    - severity
    - recurrence
    - trigger_relevant
    - promotion_status
