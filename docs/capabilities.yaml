# Psychology Agent — Capabilities Manifest
# Machine-readable inventory for agent-to-agent discovery and interop.
# Human-readable version: docs/architecture.md § Capabilities & Levers
# Maturity levels: proven | confirmed | explored | identified | deferred

version: "2.0"
updated: "2026-03-06"
agent: psychology-agent
model: claude-opus-4-6
license: CC-BY-NC-SA-4.0

maturity_levels:
  proven: "Validated, tested, documented, in daily use"
  confirmed: "Works but lacks full integration or stress testing"
  explored: "Feasibility established, spec exists, no implementation"
  identified: "On the radar, not yet tried"
  deferred: "Deliberately postponed with rationale"

architecture_items:
  - id: item-1
    name: Psychology agent identity
    maturity: proven
    spec: docs/psychology-interface-spec.md
    notes: routing spec, Socratic protocol, dynamic calibration
  - id: item-2a
    name: Sub-agent layer
    maturity: proven
    spec: docs/subagent-layer-spec.md
    notes: interagent/v1, schema v3, 6 derivation findings, PSQ binding
  - id: item-2b
    name: Peer layer
    maturity: proven
    spec: docs/peer-layer-spec.md
    notes: role declaration, divergence detection, SETL thresholds
  - id: item-3
    name: Adversarial evaluator
    maturity: confirmed
    spec: docs/architecture.md
    notes: 7-procedure ranked set, tiered activation — Tier 1 proxy active, Tier 2/3 await runtime
  - id: item-4
    name: Psychology interface
    maturity: explored
    spec: docs/psychology-interface-spec.md
    notes: spec written, no implementation — precondition met (Item 2a)

triggers:
  - id: T1
    fires_when: session_start
    function: orientation and health check
    mechanical_enforcement: SessionStart hook (session-start-orient.sh)
    maturity: proven
  - id: T2
    fires_when: before_response
    function: context pressure, pacing, fair witness, e-prime, evidence, SRT semiotic gate
    checks: 10
    mechanical_enforcement: null
    maturity: proven
  - id: T3
    fires_when: before_recommending
    function: domain classification, grounding, process/substance, anti-sycophancy, rationalizations-to-reject, Tier 1 evaluator proxy, SRT gate
    checks: 14
    mechanical_enforcement: null
    maturity: proven
  - id: T4
    fires_when: before_writing_to_disk
    function: date discipline, public visibility, routing, semantic naming, novelty, interpretant, reversibility
    checks: 10
    mechanical_enforcement: PostToolUse hook (Write|Edit matcher)
    maturity: proven
  - id: T5
    fires_when: phase_boundary
    function: mandatory gap check, Active Thread staleness, bare forks, epistemic sweep
    checks: 6
    mechanical_enforcement: Stop hook, PreCompact hook
    maturity: proven
  - id: T6
    fires_when: user_pushback
    function: position stability, drift audit, anti-sycophancy, pushback accumulator
    checks: 5
    mechanical_enforcement: UserPromptSubmit pushback-accumulator.sh
    maturity: proven
  - id: T7
    fires_when: user_approves
    function: persist to disk, resolve questions, propagate downstream, prior-approval contradiction
    checks: 4
    mechanical_enforcement: null
    maturity: proven
  - id: T8
    fires_when: task_completed
    function: loose threads, routing, context reassessment
    checks: 4
    mechanical_enforcement: Stop hook (stop-completion-gate.sh)
    maturity: proven
  - id: T9
    fires_when: reading_writing_memory
    function: line count, stale entries (5/10 session decay), duplicates, speculation guard
    checks: 5
    mechanical_enforcement: null
    maturity: proven
  - id: T10
    fires_when: lesson_surfaces
    function: write lessons.md with YAML schema, promotion scan at 3+ threshold, graduation path
    checks: 6
    mechanical_enforcement: null
    maturity: proven
  - id: T11
    fires_when: on_demand
    function: architecture audit of cogarch, memory, CLAUDE.md consistency
    checks: 5
    mechanical_enforcement: null
    maturity: proven
  - id: T12
    fires_when: good_thinking_signal
    function: name principle, mechanism, cross-domain examples; T10 co-fires
    checks: 4
    mechanical_enforcement: null
    maturity: proven
  - id: T13
    fires_when: external_content_enters
    function: source classification, injection scan, scope relevance, taint propagation, temporal staleness
    checks: 6
    mechanical_enforcement: PreToolUse parry hook, PostToolUse parry hook
    maturity: proven
  - id: T14
    fires_when: every_decision_point
    function: structural checkpoint — orders 7-10 scan (precedent, norms, emergent, theory-revising)
    checks: 6
    mechanical_enforcement: null
    maturity: proven
  - id: T15
    fires_when: psq_v3_output_enters
    function: composite gate, anti-calibration, scale discipline, PSQ-Lite mapping, WEIRD flag
    checks: 6
    mechanical_enforcement: null
    maturity: proven

hooks:
  - event: SessionStart
    script: .claude/hooks/session-start-orient.sh
    enforces: [T1]
    maturity: proven
  - event: PreToolUse
    matcher: "Bash(git commit*)"
    script: bootstrap-check.sh --check-only
    enforces: [T1]
    maturity: proven
  - event: PreToolUse
    matcher: null
    script: .claude/hooks/parry-wrapper.sh
    enforces: [T13]
    maturity: proven
  - event: PreToolUse
    matcher: "Write|Edit|Read"
    script: .claude/hooks/subproject-boundary.sh
    enforces: [T3]
    maturity: proven
  - event: PostToolUse
    matcher: "Write|Edit"
    command: inline case statement
    enforces: [T4]
    maturity: proven
  - event: PostToolUse
    matcher: "Write|Edit"
    script: .claude/hooks/write-provenance.sh
    enforces: [T4]
    maturity: proven
  - event: PostToolUse
    matcher: null
    script: .claude/hooks/parry-wrapper.sh
    enforces: [T13]
    maturity: proven
  - event: UserPromptSubmit
    script: .claude/hooks/parry-wrapper.sh
    enforces: [T13]
    maturity: proven
  - event: UserPromptSubmit
    script: .claude/hooks/pushback-accumulator.sh
    enforces: [T6]
    maturity: proven
  - event: PreCompact
    script: .claude/hooks/pre-compact-persist.sh
    enforces: [T5, T9]
    maturity: proven
  - event: Stop
    script: .claude/hooks/stop-completion-gate.sh
    enforces: [T5, T8]
    maturity: proven

